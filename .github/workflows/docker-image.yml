name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        sparse-checkout: |
          requirements.txt
          Dockerfile
          main.py
          driver/
        sparse-checkout-cone-mode: false

    - name: Build the Docker image
      run: docker build . --file Dockerfile --tag hailstone-numbers:v1.2

    - name: Save Docker image as tar file
      run: docker save hailstone-numbers:v1.2 > hailstone-numbers.tar

    - name: Create release and upload Docker image
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with: # remember to update this on every release. also, manually add body content to the release after publish
        files: hailstone-numbers.tar
        tag_name: v1.2
        name: Docker Image v1.2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}